      darkMode: 'class',
      theme: {
        extend: {

  <style>
    /* ── Search ──────────────────────────────── */
    .search-wrap { position: relative; }
    .search-icon-pos {
      position: absolute; left: 0.875rem; top: 50%;
      transform: translateY(-50%); pointer-events: none; color: #94a3b8;
    }
    .search-input {
      width: 100%; padding: 0.7rem 1rem 0.7rem 2.75rem;
      border-radius: 0.875rem; border: 1.5px solid #e2e8f0;
      background: white; color: #1e293b;
      font-size: 0.9rem; outline: none; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .search-input::placeholder { color: #94a3b8; }
    html.dark .search-input { background: #1e293b; border-color: #334155; color: #f1f5f9; }
    html.dark .search-input:focus { border-color: #818cf8; }

    /* ── Filter chips ────────────────────────── */
    .filter-chip {
      padding: 0.28rem 0.8rem; border-radius: 9999px;
      font-size: 0.72rem; font-weight: 600;
      border: 1.5px solid #e2e8f0; background: white; color: #64748b;
      cursor: pointer; transition: all 0.18s ease; white-space: nowrap;
    }
    .filter-chip:hover { border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,0.05); }
    .filter-chip.active { background: #6366f1; color: white; border-color: #6366f1; }
    html.dark .filter-chip { background: #1e293b; border-color: #334155; color: #94a3b8; }
    html.dark .filter-chip.active { background: #6366f1; color: white; border-color: #6366f1; }
    .chips-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip-divider { width: 1px; height: 20px; background: #e2e8f0; align-self: center; flex-shrink: 0; }
    html.dark .chip-divider { background: #334155; }

    /* ── Compact lesson card (available) ────────── */
    .lesson-card {
      display: flex; align-items: center; gap: 0.875rem;
      background: white; border-radius: 1rem; padding: 0.875rem 1rem;
      border: 1px solid rgba(0,0,0,0.06);
      border-left: 3px solid var(--lc-color, #6366f1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .lesson-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.09); }
    html.dark .lesson-card {
      background: #1e293b; border-color: rgba(255,255,255,0.07);
      box-shadow: 0 1px 4px rgba(0,0,0,0.28); color: inherit;
    }
    html.dark .lesson-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

    .lesson-num {
      width: 34px; height: 34px; border-radius: 0.625rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 900; color: white; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .lesson-body { flex: 1; min-width: 0; }
    .lesson-mod-tag {
      font-size: 0.575rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.09em; margin-bottom: 0.2rem;
    }
    .lesson-title {
      font-size: 0.9375rem; font-weight: 800; color: #0f172a;
      line-height: 1.25; margin-bottom: 0.2rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    html.dark .lesson-title { color: #f1f5f9; }
    .lesson-desc {
      font-size: 0.775rem; color: #64748b; line-height: 1.5;
    }
    html.dark .lesson-desc { color: #94a3b8; }
    .lesson-meta { font-size: 0.625rem; color: #94a3b8; font-weight: 600; white-space: nowrap; margin-top: 0.25rem; }
    .lesson-arrow {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: #cbd5e1;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .lesson-card:hover .lesson-arrow {
      background: var(--lc-color, #6366f1); color: white; transform: translateX(2px);
    }

    /* ── Module section wrapper (available, collapsible) ─── */
    .mod-section { margin-bottom: 1rem; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(0,0,0,0.07); }
    html.dark .mod-section { border-color: rgba(255,255,255,0.07); }
    .mod-section-head {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border-radius: 0; border: none;
      cursor: pointer; transition: opacity 0.18s; width: 100%;
      margin-bottom: 0;
    }
    .mod-section-head:hover { opacity: 0.85; }
    .mod-section-icon {
      width: 28px; height: 28px; border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .mod-section-name { font-weight: 800; font-size: 0.875rem; flex: 1; }
    .mod-section-count { font-size: 0.7rem; color: #94a3b8; white-space: nowrap; }
    .mod-section-chevron { color: #94a3b8; transition: transform 0.25s ease; flex-shrink: 0; }
    .mod-section.open .mod-section-chevron { transform: rotate(180deg); }
    .mod-section-body {
      display: none; padding: 0 0.75rem 0.75rem; background: white;
    }
    html.dark .mod-section-body { background: #1e293b; }
    .mod-section.open .mod-section-body { display: block; }

    /* ── Coming soon accordion ───────────────── */
    .cs-accordion { border-radius: 1rem; overflow: hidden; margin-bottom: 0.625rem; border: 1px solid rgba(0,0,0,0.07); }
    html.dark .cs-accordion { border-color: rgba(255,255,255,0.07); }
    .cs-accordion-btn {
      width: 100%; display: flex; align-items: center; gap: 0.75rem;
      padding: 0.875rem 1rem; background: white; cursor: pointer;
      text-align: left; border: none; transition: background 0.18s;
    }
    .cs-accordion-btn:hover { background: #f8fafc; }
    html.dark .cs-accordion-btn { background: #1e293b; }
    html.dark .cs-accordion-btn:hover { background: #263045; }
    .cs-mod-badge {
      width: 30px; height: 30px; border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cs-accordion-name { font-weight: 800; font-size: 0.875rem; flex: 1; }
    html.dark .cs-accordion-name { color: #e2e8f0; }
    .cs-accordion-count {
      font-size: 0.7rem; font-weight: 600; color: #94a3b8;
      padding: 0.18rem 0.6rem; border-radius: 9999px;
      background: rgba(148,163,184,0.1); white-space: nowrap;
    }
    .cs-accordion-chevron { color: #94a3b8; transition: transform 0.25s ease; flex-shrink: 0; }
    .cs-accordion.open .cs-accordion-chevron { transform: rotate(180deg); }
    .cs-accordion-body {
      display: none; padding: 0 0.75rem 0.75rem;
      background: white;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem;
    }
    html.dark .cs-accordion-body { background: #1e293b; }
    .cs-accordion.open .cs-accordion-body { display: grid; }

    .cs-mini {
      border-radius: 0.75rem; padding: 0.75rem 0.875rem;
      background: #f8fafc; border: 1px solid rgba(0,0,0,0.05);
      opacity: 0.7;
    }
    html.dark .cs-mini { background: rgba(15,23,42,0.5); border-color: rgba(255,255,255,0.05); }
    .cs-mini-num { font-size: 0.6rem; font-weight: 800; color: #94a3b8; margin-bottom: 0.2rem; }
    .cs-mini-title { font-size: 0.825rem; font-weight: 800; color: #334155; margin-bottom: 0.25rem; line-height: 1.3; }
    html.dark .cs-mini-title { color: #cbd5e1; }
    .cs-mini-desc { font-size: 0.7rem; color: #94a3b8; line-height: 1.5; }
    .cs-mini-meta { font-size: 0.6rem; color: #94a3b8; margin-top: 0.4rem; }

    /* ── Available count badge ───────────────── */
    .avail-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.6rem; font-weight: 800;
      padding: 0.2rem 0.55rem; border-radius: 9999px;
      background: rgba(37,99,235,0.1); color: #1d4ed8;
      border: 1px solid rgba(37,99,235,0.2);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    html.dark .avail-badge { background: rgba(96,165,250,0.12); color: #60a5fa; border-color: rgba(96,165,250,0.22); }

    /* ── Flow pills ──────────────────────────── */
    .flow-pill {
      padding: 0.3rem 0.75rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 700; border: 1.5px solid; white-space: nowrap;
    }
    .flow-sep { color: #cbd5e1; font-size: 0.875rem; flex-shrink: 0; }

    /* ── Section card ────────────────────────── */
    .section-card {
      background: white; border-radius: 1.25rem; padding: 1.5rem;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    html.dark .section-card { background: #1e293b; border-color: rgba(255,255,255,0.06); }

    /* ── Empty state ─────────────────────────── */
    .dyn-empty { text-align: center; padding: 2.5rem 1rem; }
    .dyn-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .dyn-empty-title { font-weight: 700; font-size: 0.9rem; color: #64748b; }
    html.dark .dyn-empty-title { color: #475569; }
    .dyn-empty-sub { font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }

    /* ── Dark mode for dynamic content ──────── */
    .dyn-mod-lbl { font-size: 0.575rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; }
    .dyn-cs-title { color: #1e293b; font-size: 0.9375rem; font-weight: 800; line-height: 1.3; margin-bottom: 0.35rem; }
    html.dark .dyn-cs-title { color: #e2e8f0; }
    .dyn-cs-desc { color: #64748b; font-size: 0.8rem; line-height: 1.6; }
    html.dark .dyn-cs-desc { color: #94a3b8; }
    .dyn-mod-name { font-weight: 800; font-size: 0.875rem; }
    .dyn-mod-count { font-size: 0.7rem; color: #94a3b8; }
  </style>
</head>

      { num:2,  id:'embeddings',    title:'Embeddings',                   desc:'Learn how meaning can be represented as vectors.',            status:'available',   diff:'Beginner',     dur:'10 min', mod:'Embeddings & Search', page:'modules/embeddings.html',                 icon:'map-pin',       color:'#2563eb' },
      { num:3,  id:'kw-vs-sem',     title:'Keyword vs Semantic Search',   desc:'See why AI understands meaning, not just words.',             status:'available',   diff:'Beginner',     dur:'10 min', mod:'Embeddings & Search', page:'modules/keyword-vs-semantic-search.html', icon:'search',        color:'#2563eb' },
      { num:4,  id:'similarity',    title:'Similarity Metrics',           desc:'Learn how computers measure how alike two items are.',        status:'available',   diff:'Beginner',     dur:'10 min', mod:'Embeddings & Search', page:'modules/similarity.html',                 icon:'ruler',         color:'#2563eb' },
      { num:5,  id:'dist-vs-sim',   title:'Distance vs Similarity',       desc:'Learn the difference between distance and similarity.',      status:'available',   diff:'Beginner',     dur:'8 min',  mod:'Embeddings & Search', page:'modules/distance-vs-similarity.html',     icon:'arrow-left-right', color:'#2563eb' },
      { num:6,  id:'knn',           title:'KNN Search',                   desc:'Learn how nearest neighbors are found.',                      status:'available',   diff:'Beginner',     dur:'10 min', mod:'Embeddings & Search', page:'modules/knn.html',                        icon:'search',        color:'#2563eb' },
      { num:7,  id:'top-k',         title:'Top-K Search',                 desc:'Learn how the best K results are returned.',                  status:'available',   diff:'Beginner',     dur:'8 min',  mod:'Embeddings & Search', page:'modules/top-k.html',                      icon:'filter',        color:'#2563eb' },
      { num:8,  id:'ranking',       title:'Ranking',                      desc:'Understand how search results are ordered by relevance.',     status:'available',   diff:'Beginner',     dur:'8 min',  mod:'Embeddings & Search', page:'modules/ranking.html',                    icon:'list',          color:'#2563eb' },

      { num:10, id:'sim-matrix',    title:'Similarity Matrix',            desc:'Compare every item with every other item at once.',           status:'available',   diff:'Intermediate', dur:'10 min', mod:'Embeddings & Search', page:'modules/similarity-matrix.html',          icon:'grid',          color:'#2563eb' },
      { num:11, id:'emb-dims',      title:'Embedding Dimensions',         desc:'Understand what vector dimensions mean.',                     status:'available',   diff:'Beginner',     dur:'10 min', mod:'Embeddings & Search', page:'modules/embedding-dimensions.html',       icon:'layers',        color:'#2563eb' },

      // ── Module 4: Retrieval-Augmented Generation ──────────────────────────────

      { num:4,  id:'vec-search',    title:'Vector Search',                desc:'Find relevant chunks using vector similarity.',               status:'coming-soon', diff:'Intermediate', dur:'10 min', mod:'Retrieval-Augmented Generation', page:null,                                      icon:'zap',           color:'#0d9488' },
      { num:5,  id:'retrieval',     title:'Retrieval',                    desc:'Bring useful information back to the AI.',                    status:'coming-soon', diff:'Intermediate', dur:'8 min',  mod:'Retrieval-Augmented Generation', page:null,                                      icon:'inbox',         color:'#0d9488' },
      { num:6,  id:'reranking',     title:'Re-ranking',                   desc:'Reorder retrieved results for better relevance.',             status:'coming-soon', diff:'Intermediate', dur:'8 min',  mod:'Retrieval-Augmented Generation', page:null,                                      icon:'arrow-up-down', color:'#0d9488' },
      { num:7,  id:'rag-pipeline',  title:'RAG Pipeline',                 desc:'See the full retrieval-augmented generation flow.',           status:'coming-soon', diff:'Intermediate', dur:'12 min', mod:'Retrieval-Augmented Generation', page:null,                                      icon:'git-branch',    color:'#0d9488' },
    ];

    const MODULE_CONFIGS = {
      'How AI Works':                     { icon:'brain',    color:'#6366f1', bg:'rgba(99,102,241,0.07)',  border:'rgba(99,102,241,0.2)',  iconBg:'rgba(99,102,241,0.1)'  },
      'Embeddings & Search':              { icon:'search',   color:'#2563eb', bg:'rgba(37,99,235,0.07)',   border:'rgba(37,99,235,0.2)',   iconBg:'rgba(37,99,235,0.1)'   },
      'Retrieval-Augmented Generation':   { icon:'database', color:'#0d9488', bg:'rgba(13,148,136,0.07)', border:'rgba(13,148,136,0.2)',  iconBg:'rgba(13,148,136,0.1)'  },
      'Vector Indexes':                   { icon:'layers',   color:'#d97706', bg:'rgba(217,119,6,0.07)',  border:'rgba(217,119,6,0.2)',   iconBg:'rgba(217,119,6,0.1)'   },
    };

    const DIFF_CONFIG = {
      Beginner:     { cls:'badge-beginner',     emoji:'🟢' },
      Intermediate: { cls:'badge-intermediate', emoji:'🟡' },
      Advanced:     { cls:'badge-advanced',     emoji:'🔴' },
    };

    let activeFilter = 'all';
    let searchText   = '';

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function refreshIcons(el) {
      if (typeof lucide === 'undefined') return;
      el ? lucide.createIcons({ nodes: [el] }) : lucide.createIcons();
    }

    function getFiltered() {
      const q = searchText.toLowerCase();
      return LESSONS.filter(l => {
        if (q) {
          const hay = (l.title + ' ' + l.desc + ' ' + l.mod).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        if (activeFilter === 'all')               return true;
        if (activeFilter === 'available')         return l.status === 'available';
        if (activeFilter === 'coming-soon')       return l.status === 'coming-soon';
        if (activeFilter === 'Beginner')          return l.diff === 'Beginner';
        if (activeFilter === 'Intermediate')      return l.diff === 'Intermediate';
        if (activeFilter === 'Advanced')          return l.diff === 'Advanced';
        if (activeFilter === 'How AI Works')       return l.mod === 'How AI Works';
        if (activeFilter === 'Embeddings & Search') return l.mod === 'Embeddings & Search';
        if (activeFilter === 'Vector Indexes')      return l.mod === 'Vector Indexes';
        if (activeFilter === 'RAG')               return l.mod === 'Retrieval-Augmented Generation';
        return true;
      });
    }

    /* ── Render: Available lessons, grouped by module, no per-card module tag ── */
    function renderAvailable(filtered) {
      const available = filtered.filter(l => l.status === 'available');
      const section   = document.getElementById('availableSection');
      const container = document.getElementById('availableContainer');

      if (activeFilter === 'coming-soon') { section.style.display = 'none'; return; }
      section.style.display = '';

      if (!available.length) {
        container.innerHTML = `<div class="dyn-empty"><div class="dyn-empty-icon">🔍</div><div class="dyn-empty-title">No available lessons match</div><div class="dyn-empty-sub">Try a different search or filter.</div></div>`;
        return;
      }

      // Group by module
      const groups = new Map();
      available.forEach(l => {
        if (!groups.has(l.mod)) groups.set(l.mod, []);
        groups.get(l.mod).push(l);
      });

      let html = '';
      groups.forEach((lessons, mod) => {
        const cfg = MODULE_CONFIGS[mod] || MODULE_CONFIGS['AI Fundamentals'];

        const cards = lessons.map(l => {
          const diff = DIFF_CONFIG[l.diff] ?? DIFF_CONFIG.Beginner;
          return `
            <a href="${esc(l.page)}" class="lesson-card" style="--lc-color:${esc(l.color)};">
              <div class="lesson-num" style="background:${esc(l.color)};">${l.num}</div>
              <div class="lesson-body">
                <div class="lesson-title">${esc(l.title)}</div>
                <div class="lesson-desc">${esc(l.desc)}</div>
                <div class="lesson-meta">${esc(l.dur)} · ${diff.emoji} ${l.diff}</div>
              </div>
              <div class="lesson-arrow">
                <i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
              </div>
            </a>`;
        }).join('');

        html += `
          <div class="mod-section open" id="avail-acc-${esc(mod.replace(/\s+/g,'-'))}">
            <div class="mod-section-head" style="background:${cfg.bg};" onclick="toggleModSection('avail-acc-${esc(mod.replace(/\s+/g,'-'))}')">
              <div class="mod-section-icon" style="background:${cfg.iconBg};">
                <i data-lucide="${cfg.icon}" style="width:13px;height:13px;color:${cfg.color};"></i>
              </div>
              <span class="mod-section-name" style="color:${cfg.color};">${esc(mod)}</span>
              <span class="mod-section-count">${lessons.length} lesson${lessons.length !== 1 ? 's' : ''}</span>
              <i data-lucide="chevron-down" style="width:15px;height:15px;" class="mod-section-chevron"></i>
            </div>
            <div class="mod-section-body">
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0.5rem;padding-top:0.5rem;">
                ${cards}
              </div>
            </div>
          </div>`;
      });

      container.innerHTML = html;
      refreshIcons(container);
    }

    /* ── Render: Coming Soon (collapsible accordion by module) ── */
    function renderComingSoon(filtered) {
      const upcoming  = filtered.filter(l => l.status === 'coming-soon');
      const section   = document.getElementById('comingSoonSection');
      const container = document.getElementById('comingSoonContainer');

      if (activeFilter === 'available') { section.style.display = 'none'; return; }
      section.style.display = '';

      if (!upcoming.length) {
        container.innerHTML = `<div class="dyn-empty"><div class="dyn-empty-icon">🔍</div><div class="dyn-empty-title">No upcoming lessons match</div><div class="dyn-empty-sub">Try a different search or filter.</div></div>`;
        return;
      }

      // Group by module (preserving order)
      const ordered = [];
      const seen = new Map();
      upcoming.forEach(l => {
        if (!seen.has(l.mod)) { seen.set(l.mod, []); ordered.push(l.mod); }
        seen.get(l.mod).push(l);
      });

      container.innerHTML = ordered.map((mod, modIdx) => {
        const lessons = seen.get(mod);
        const cfg = MODULE_CONFIGS[mod] || { icon:'book-open', color:'#6366f1', bg:'rgba(99,102,241,0.07)', border:'rgba(99,102,241,0.2)', iconBg:'rgba(99,102,241,0.1)' };
        const isSearch = !!searchText;

        const cards = lessons.map(l => {
          const diff = DIFF_CONFIG[l.diff] ?? DIFF_CONFIG.Beginner;
          return `
            <div class="cs-mini">
              <div class="cs-mini-num">${l.num}</div>
              <div class="cs-mini-title">${esc(l.title)}</div>
              <div class="cs-mini-desc">${esc(l.desc)}</div>
              <div class="cs-mini-meta">${diff.emoji} ${l.diff} · ${esc(l.dur)}</div>
            </div>`;
        }).join('');

        // Auto-open first accordion (or all when searching)
        const openClass = (modIdx === 0 || isSearch) ? ' open' : '';

        return `
          <div class="cs-accordion${openClass}" id="acc-${modIdx}">
            <button class="cs-accordion-btn" onclick="toggleAccordion('acc-${modIdx}')">
              <div class="cs-mod-badge" style="background:${cfg.iconBg};">
                <i data-lucide="${cfg.icon}" style="width:14px;height:14px;color:${cfg.color};"></i>
              </div>
              <span class="cs-accordion-name">${esc(mod)}</span>
              <span class="cs-accordion-count">${lessons.length} lessons</span>
              <i data-lucide="chevron-down" style="width:15px;height:15px;" class="cs-accordion-chevron"></i>
            </button>
            <div class="cs-accordion-body">
              ${cards}
            </div>
          </div>`;
      }).join('');

      refreshIcons(container);
    }

    window.toggleAccordion = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('open');
    };

    window.toggleModSection = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('open');
    };

    function applyFilters() {
      const filtered = getFiltered();
      renderAvailable(filtered);
      renderComingSoon(filtered);
    }

    function syncDarkIcons() {
      const dark = Utils.isDark();
      document.querySelectorAll('.icon-sun').forEach(el  => el.classList.toggle('hidden',  dark));
      document.querySelectorAll('.icon-moon').forEach(el => el.classList.toggle('hidden', !dark));
    }

    window.addEventListener('load', () => {
      AIPlayground.init();
      syncDarkIcons();

      // Update hero badge count from data
      const availCount = LESSONS.filter(l => l.status === 'available').length;
      const totalCount = LESSONS.length;
      const heroBadgeCount = document.getElementById('heroBadgeCount');
      const statAvailable  = document.getElementById('statAvailable');
      const statTotal      = document.getElementById('statTotal');
      if (heroBadgeCount) heroBadgeCount.textContent = `📚 ${availCount} lessons`;
      if (statAvailable)  statAvailable.textContent  = availCount;
      if (statTotal)      statTotal.textContent       = totalCount;

      const searchEl = document.getElementById('searchInput');
      searchEl.addEventListener('input', Utils.debounce(() => {
        searchText = searchEl.value.trim();
        applyFilters();
      }, 180));

      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilter = chip.dataset.filter;
          applyFilters();
        });
      });

      applyFilters();
    });
  </script>

  <!-- ── Hero animations ── -->
  <script>
  (function() {
    /* ── 1. Particle canvas ── */
    function initParticles() {
      const canvas = document.getElementById('heroCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      const COLORS = ['#818cf8','#c084fc','#38bdf8','#34d399','#f472b6'];
      const COUNT  = 60;

      function resize() {
        W = canvas.width  = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function rand(a, b) { return Math.random() * (b - a) + a; }

      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: rand(0, W), y: rand(0, H),
          vx: rand(-0.25, 0.25), vy: rand(-0.25, 0.25),
          r: rand(1.5, 3.5),
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          alpha: rand(0.3, 0.8)
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              const isDark = document.documentElement.classList.contains('dark');
              ctx.strokeStyle = isDark
                ? `rgba(129,140,248,${0.12 * (1 - dist/110)})`
                : `rgba(99,102,241,${0.09 * (1 - dist/110)})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
        // Draw dots
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color + Math.round(p.alpha * 255).toString(16).padStart(2,'0');
          ctx.fill();
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;
        });
        requestAnimationFrame(draw);
      }
      draw();
    }

    /* ── 2. GSAP entrance ── */
    function initGSAP() {
      if (!window.gsap) return;
      const elems = document.querySelectorAll('.hero-anim');
      gsap.fromTo(elems,
        { opacity: 0, y: 40, scale: 0.95 },
        { opacity: 1, y: 0,  scale: 1,
          duration: 0.8, stagger: 0.15,
          ease: 'power3.out', delay: 0.1 }
      );
      // CTA button pulse after entrance
      gsap.to('#heroCTA', {
        boxShadow: '0 0 40px rgba(139,92,246,0.6)',
        repeat: -1, yoyo: true,
        duration: 2, ease: 'sine.inOut', delay: 1.2
      });
    }

    /* ── 3. Typewriter ── */
    function initTypewriter() {
      const el = document.getElementById('heroTypewriter');
      if (!el) return;
      const lines = [
        'No boring slides. Just hands-on AI. ✨',
        'Tokens, embeddings, models. Demystified.',
        'Experiment. Break things. Learn faster. 🚀',
        'From zero to AI fluent. No fluff. ⚡',
      ];
      let li = 0, ci = 0, deleting = false;
      function tick() {
        const target = lines[li];
        if (!deleting) {
          el.textContent = target.slice(0, ++ci);
          if (ci === target.length) { deleting = true; setTimeout(tick, 2200); return; }
        } else {
          el.textContent = target.slice(0, --ci);
          if (ci === 0) { deleting = false; li = (li + 1) % lines.length; }
        }
        setTimeout(tick, deleting ? 28 : 52);
      }
      tick();
    }

    /* ── 4. Mouse parallax on blobs ── */
    function initParallax() {
      const b1 = document.getElementById('blob1');
      const b2 = document.getElementById('blob2');
      const b3 = document.getElementById('blob3');
      if (!b1 || !b2 || !b3) return;
      document.getElementById('hero').addEventListener('mousemove', e => {
        const rect = e.currentTarget.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / rect.width  - 0.5;
        const my = (e.clientY - rect.top)  / rect.height - 0.5;
        if (window.gsap) {
          gsap.to(b1, { x: mx * 40,  y: my * 30,  duration: 1.8, ease: 'power2.out' });
          gsap.to(b2, { x: mx * -50, y: my * -35, duration: 1.8, ease: 'power2.out' });
          gsap.to(b3, { x: mx * 30,  y: my * 50,  duration: 1.8, ease: 'power2.out' });
        }
      });
    }

    window.addEventListener('load', () => {
      initParticles();
      initGSAP();
      initTypewriter();
      initParallax();
    });
  })();
  </script>
